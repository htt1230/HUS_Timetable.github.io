<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バス発車標 - 北海道科学大学</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic&family=Inter+Tight:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 全全体のベース設定（フォントの自動出し分けを設定） */
        html, body {
            background-color: #ffffff;
            font-family: "Inter Tight", "BIZ UDGothic", sans-serif;
            color: #232323;
            margin: 0;
            padding: 15px;
            user-select: none;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* -------------------------------------
           開発用タイムスライダー
         ------------------------------------- */
        .dev-slider-container {
            background-color: #f9f9f9;
            border: 1px dashed #f39c12;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 13px;
        }
        .dev-slider-title {
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .dev-slider {
            width: 100%;
            cursor: pointer;
        }

        /* -------------------------------------
           直近の発車情報（白地・ミニマル）
        ------------------------------------- */
        .lcd-board {
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }
        .lcd-header {
            background-color: #f5f5f5;
            color: #232323;
            font-weight: bold;
            font-size: 30px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        
        #current-clock {
            font-weight: 700;
        }
        
        #lcd-entries {
            display: flex;
            gap: 10px;
            padding: 10px;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        /* 方面ごとの縦並びグループ（複数行をまとめるコンテナ） */
        .bus-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 個別のバスカード（各行のスタイル） */
        .bus-card {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 10px 12px;
            width: 100%;
            height: 70px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-width: 2.2px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 影の指定 */
        }

        /* 先頭（一番上の行）の枠線を黒く強調 */
        .bus-card.primary {
        border-color: #404344;

        }

        /* 2本目以降の行 */
        .bus-card.sub-row {
            background-color: #fafafa;
        }

        /* 1行目 (系統, 時間) */
        .card-row-1 {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .c-dir-name {
            font-size: 20px;
            color: #232323;
            text-align: center;
        }
        .c-route {
            background-color: #333;
            border-radius: 5px;
            color: #ffffff;
            padding: 2px 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .c-time {
            font-weight: 700;
            font-size: 24px;
            line-height: 1;
            margin-left: auto;
        }

        /* 2行目 (行き先, 始発, カウントダウン) */
        .card-row-2 {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .c-dest {
            font-size: 16px;
            font-weight: bold;
        }
        .c-first {
            color: #fff;
            font-size: 10px;
            margin-left: 2px;
            background-color: #dd3333;
            padding: 1px 4px;
            border-radius: 4px;
        }
        .c-countdown {
            margin-left: auto;
            color: #666;
            font-size: 13px;
        }

        /* 3行目 (備考) */
        .card-row-3 {
            font-size: 11px;
            color: #666;
            border-top: 1px solid #ddd;
            padding-top: 4px;
            margin-top: 2px;
        }

        /* -------------------------------------
           タブ・フィルター・テーブル
        ------------------------------------- */
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #888;
            font-size: 14px;
            background-color: #fafafa;
        }
        .tab:not(:last-child) {
            border-right: 1px solid #ddd;
        }
        .tab.active {
            background: #ffffff;
            color: #232323;
            font-weight: bold;
        }

        .filter-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        select {
            background: #ffffff;
            color: #232323;
            border: 1px solid #ddd;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f5f5f5;
            color: #666;
            font-weight: normal;
        }
        
        .table-time {
            font-weight: 700;
            font-size: 20px;
        }

        #loading, #no-data {
            text-align: center;
            padding: 30px;
            font-size: 14px;
            color: #666;
        }

        @media (max-width: 600px) {
            #lcd-entries { flex-direction: column; }
        }

        /* テーブルの列幅の指定 */
        #timetable th:nth-child(1), #timetable td:nth-child(1) { width: 20%; } 
        #timetable th:nth-child(2), #timetable td:nth-child(2) { width: 35%; } 
        #timetable th:nth-child(3), #timetable td:nth-child(3) { width: 10%; } 
        #timetable th:nth-child(4), #timetable td:nth-child(4) { width: 15%; } 
        #timetable th:nth-child(5), #timetable td:nth-child(5) { width: 20%; } 
    </style>
</head>
<body>

<div class="container">
    
    <div class="dev-slider-container">
        <div class="dev-slider-title">
            <span>⚙️ 開発用時間シミュレーター (スライダーを動かすと時間を変更できます)</span>
            <span id="slider-time-display">00:00</span>
        </div>
        <input type="range" id="time-slider" class="dev-slider" min="0" max="1439" value="0">
    </div>
    
    <div class="lcd-board" id="lcd-board" style="display: none;">
        <div class="lcd-header">
            <span></span>
            <span id="current-clock">--:--</span>
        </div>
        <div id="lcd-entries"></div>
    </div>

    <div class="tabs">
        <div class="tab" id="tab-平日" onclick="changeDate('平日')">平日</div>
        <div class="tab" id="tab-土曜" onclick="changeDate('土曜')">土曜</div>
        <div class="tab" id="tab-日曜/祝日" onclick="changeDate('日曜/祝日')">日祝</div>
    </div>

    <div class="filter-container" id="filter-ui" style="display: none;">
        <label for="dest-select">行き先:</label>
        <select id="dest-select" onchange="renderTable()"></select>
    </div>

    <div id="loading">データを取得中...</div>
    <div id="no-data" style="display: none;">本日の運行は終了しました。</div>

    <table id="timetable" style="display: none;">
        <thead>
            <tr>
                <th>系統</th>
                <th>行き先</th>
                <th></th>
                <th>時刻</th>
                <th>備考</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1FjixtV7RSD3oJ_KskkLw-Pme-5t85rfGqofP2gIRAjg/gviz/tq?tqx=out:json&sheet=北海道科学大学";
    
    // 【一般化規定】上部のカード（lcd-board）に表示するグループと対象の行先
    const DIRECTION_CONFIG = [
        { name: "手稲駅方面", dests: ["手稲駅北口"] },
        { name: "星置駅方面",   dests: ["星置駅"] },
        { name: "宮の沢方面",   dests: ["宮の沢駅"] }
    ];

    // 系統ごとの背景色と文字色の辞書
    const ROUTE_COLORS = {
        "宮79":     { bg: "#ff8c00", text: "#232323" },
        "循環手48": { bg: "#8eed8e", text: "#232323" },
        "手48":     { bg: "#8eed8e", text: "#232323" },
        "手85":     { bg: "#4595e6", text: "#232323" }
    };

    const DEP_TIME_CLASSES = [
        { maxMin: 1,  color: "#ff3b30" }, 
        { maxMin: 3,  color: "#ffaa00" }, 
        { maxMin: 10, color: "#009900" }  
    ];

    const DEFAULT_TIME_COLOR = "#8e8e93"; 
    const DEFAULT_ROUTE_COLOR = { bg: "#333333", text: "#ffffff" };

    function getRouteStyle(routeNumber) {
        const color = ROUTE_COLORS[routeNumber] || DEFAULT_ROUTE_COLOR;
        return `background-color: ${color.bg}; color: ${color.text};`;
    }

    function getDepartureTimeColor(depmin) {
        for (const range of DEP_TIME_CLASSES) {
            if (depmin <= range.maxMin) return `color: ${range.color};`;
        }
        return `color: ${DEFAULT_TIME_COLOR};`;
    }

    let allData = [];
    let currentDate = '平日';
    
    let simHour = 0;
    let simMin = 0;

    window.onload = async function() {
        const now = new Date();
        simHour = now.getHours();
        simMin = now.getMinutes();
        
        const slider = document.getElementById('time-slider');
        slider.value = simHour * 60 + simMin;

        slider.addEventListener('input', function() {
            const totalMinutes = parseInt(this.value, 10);
            simHour = Math.floor(totalMinutes / 60);
            simMin = totalMinutes % 60;
            
            updateClockDisplay();
            renderNextBuses(); 
        });

        updateClockDisplay();

        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            
            const start = text.indexOf('{');
            const end = text.lastIndexOf('}');
            const json = JSON.parse(text.substring(start, end + 1));
            
            allData = parseSheetData(json);
            
            const today = now.getDay();
            if (today === 0) currentDate = '日曜/祝日';
            else if (today === 6) currentDate = '土曜';
            else currentDate = '平日';
            
            document.getElementById('tab-' + currentDate).classList.add('active');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('lcd-board').style.display = 'block';
            document.getElementById('filter-ui').style.display = 'flex';
            document.getElementById('timetable').style.display = 'table';
            
            updateDestDropdown();
            renderTable();
            renderNextBuses();

        } catch (error) {
            document.getElementById('loading').innerText = "通信エラー";
        }
    };

    function updateClockDisplay() {
        const h = String(simHour).padStart(2, '0');
        const m = String(simMin).padStart(2, '0');
        const timeStr = `${h}:${m}`;
        
        document.getElementById('current-clock').innerText = timeStr;
        document.getElementById('slider-time-display').innerText = timeStr;
    }

    function parseSheetData(json) {
        const rows = json.table.rows;
        let parsed = [];
        rows.forEach(row => {
            const getVal = (col) => (col && col.v !== null) ? col.v : '';
            const depH = getVal(row.c[0]);
            if (depH === 'dep-h') return;

            parsed.push({
                h: parseInt(depH, 10),
                m: parseInt(getVal(row.c[1]), 10),
                dest: getVal(row.c[2]),
                isFirst: getVal(row.c[3]),
                number: getVal(row.c[4]),
                date: getVal(row.c[5]),
                bikou: getVal(row.c[6])
            });
        });
        return parsed;
    }

    function changeDate(dateType) {
        currentDate = dateType;
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
            if(tab.getAttribute('onclick').includes(dateType)) tab.classList.add('active');
        });
        updateDestDropdown();
        renderTable();
        renderNextBuses();
    }

    function updateDestDropdown() {
        const select = document.getElementById('dest-select');
        const currentData = allData.filter(d => d.date === currentDate);
        const uniqueDests = [...new Set(currentData.map(d => d.dest))].filter(d => d !== '');
        
        select.innerHTML = '<option value="all">すべて</option>';
        uniqueDests.forEach(dest => {
            const option = document.createElement('option');
            option.value = dest;
            option.innerText = dest;
            select.appendChild(option);
        });
    }

    function renderNextBuses() {
        const container = document.getElementById('lcd-entries');
        container.innerHTML = '';

        const selectedDest = document.getElementById('dest-select').value;
        let targetData = allData.filter(d => d.date === currentDate);
        if (selectedDest !== 'all') {
            targetData = targetData.filter(d => d.dest === selectedDest);
        }

        const currentTotalMin = simHour * 60 + simMin;

        // ★【ロジック変更】未来のバスのみ（現在時間以降）をいったん抽出
        const upcoming = targetData.filter(bus => {
            const busTotalMin = bus.h * 60 + bus.m;
            return busTotalMin >= currentTotalMin;
        });

        DIRECTION_CONFIG.forEach((dir) => {
            // この方面のバスの中で「発車まで120分(2時間)以内」のものだけを最大3件抽出
            const matchBuses = upcoming.filter(bus => {
                const busTotalMin = bus.h * 60 + bus.m;
                const isMatchDest = dir.dests.includes(bus.dest);
                const isWithin120Min = (busTotalMin - currentTotalMin) <= 120; // ★ここが発車120分前制限
                return isMatchDest && isWithin120Min;
            }).slice(0, 3);

            let columnHtml = `
                <div class="bus-column">
                    <div style="text-align:center;">
                        <span class="c-dir-name">${dir.name}</span>
                    </div>
            `;

            // 120分以内に対象のバスがない場合は、空欄にせず「運行情報なし」枠を表示
            if (matchBuses.length === 0) {
                columnHtml += `
                    <div class="bus-card">
                        <div class="card-row-1">
                            <span class="c-time" style="font-size:16px; color:#aaa;">なし</span>
                        </div>
                        <div class="card-row-2">
                            <span class="c-dest" style="font-size:14px; color:#aaa;">120分以内の発車なし</span>
                        </div>
                    </div>
                `;
            } else {
                matchBuses.forEach((bus, rowIndex) => {
                    const diffMin = (bus.h * 60 + bus.m) - currentTotalMin;
                    const minStr = String(bus.m).padStart(2, '0');
                    
                    const rowClass = rowIndex === 0 ? 'primary' : 'sub-row';
                    const firstBadge = (bus.isFirst == 1) ? '<span class="c-first">始発</span>' : '';
                    const bikouHtml = bus.bikou ? `<div class="card-row-3">${bus.bikou}</div>` : '';
                    
                    const routeStyle = getRouteStyle(bus.number);
                    const depTimeColor = getDepartureTimeColor(diffMin);

                    columnHtml += `
                        <div class="bus-card ${rowClass}">
                            <div class="card-row-1">
                                <span class="c-route" style="${routeStyle}">${bus.number}</span>
                                <span class="c-time">${bus.h}:${minStr}</span>
                            </div>
                            <div class="card-row-2">
                                <span class="c-dest">${bus.dest}</span>
                                ${firstBadge}
                                <span class="c-countdown">あと<span style="font-size:18px; ${depTimeColor}">${diffMin}分</span></span>
                            </div>
                            ${bikouHtml}
                        </div>
                    `;
                });
            }

            columnHtml += `</div>`;
            container.innerHTML += columnHtml;
        });
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        const selectedDest = document.getElementById('dest-select').value;
        tbody.innerHTML = '';

        let displayData = allData.filter(d => d.date === currentDate);
        if (selectedDest !== 'all') {
            displayData = displayData.filter(d => d.dest === selectedDest);
        }

        if (displayData.length === 0) {
            document.getElementById('timetable').style.display = 'none';
            document.getElementById('no-data').style.display = 'block';
            return;
        }

        document.getElementById('timetable').style.display = 'table';
        document.getElementById('no-data').style.display = 'none';

        displayData.forEach(bus => {
            const minStr = String(bus.m).padStart(2, '0');
            const firstBadge = (bus.isFirst == 1) ? '<span class="c-first">始発</span>' : '';
            
            const routeStyle = getRouteStyle(bus.number);

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="c-route" style="${routeStyle}">${bus.number}</span></td>
                <td>${bus.dest}</td>
                <td>${firstBadge}</td>
                <td><span class="table-time">${bus.h}:${minStr}</span></td>
                <td style="color:#666; font-size:13px;">${bus.bikou}</td>
            `;
            tbody.appendChild(tr);
        });
        renderNextBuses();
    }
</script>

</body>
</html>
